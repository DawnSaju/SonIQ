name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-dmg:
    name: Build ${{ matrix.architecture }} DMG
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            architecture: arm64
            dmg_suffix: aarch64
          - runner: macos-15-intel
            architecture: x64
            dmg_suffix: x64

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ matrix.architecture }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ matrix.architecture }}-

      - name: Install dependencies
        run: npm ci

      - name: Cache SonIQ release runtime
        uses: actions/cache@v4
        with:
          path: |
            release-artifacts/ffmpeg-runtime/source-cache
            release-artifacts/pkg-cache
            src-tauri/resources/release-runtime
          key: release-runtime-${{ runner.os }}-${{ matrix.architecture }}-${{ hashFiles('scripts/build-media-tools.mjs', 'scripts/package-recognition-sidecar.mjs', 'scripts/recognition-adapter.cjs', 'package-lock.json') }}

      - name: Install NASM for Intel FFmpeg
        if: matrix.architecture == 'x64'
        run: |
          brew install nasm
          echo "$(brew --prefix nasm)/bin" >> "$GITHUB_PATH"

      - name: Build release DMG
        run: npm run build:release

      - name: Write release checksum
        run: |
          cd src-tauri/target/release/bundle/dmg
          shasum -a 256 SonIQ_*_${{ matrix.dmg_suffix }}.dmg > SonIQ_${{ matrix.dmg_suffix }}.dmg.sha256

      - name: Upload ${{ matrix.architecture }} DMG
        uses: actions/upload-artifact@v4
        with:
          name: soniq-dmg-${{ matrix.architecture }}
          path: |
            src-tauri/target/release/bundle/dmg/SonIQ_*_${{ matrix.dmg_suffix }}.dmg
            src-tauri/target/release/bundle/dmg/SonIQ_${{ matrix.dmg_suffix }}.dmg.sha256
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: build-dmg
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release DMGs
        uses: actions/download-artifact@v4
        with:
          pattern: soniq-dmg-*
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          ls -lh release-assets/*
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/* --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/* --title "$RELEASE_TAG" --generate-notes
          fi
